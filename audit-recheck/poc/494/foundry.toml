[profile.default]
src = "src"
test = "test"
out = "out"
cache_path = "cache"
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true
auto_detect_solc = false
verbosity = 3
evm_version = "cancun"
# Let tests exercise the full per-call gas (this PoC deliberately drives setPatches with
# N=80 observed issuers, which consumes >30M gas and is precisely the DoS condition being
# demonstrated). Without this, the very last measurement hits the 30M block gas limit, which
# is itself useful evidence but prevents us from producing the gas(80)/gas(10) ratio.
gas_limit = "18446744073709551615"
